---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bridge-operator-daemon
  labels:
    app.kubernetes.io/name: bridge-operator-daemon
    app.kubernetes.io/part-of: bridge-operator
rules:
# Read node labels to determine which configurations apply
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get"]
# Watch and read bridge configurations
- apiGroups: ["bridgeoperator.k8s.cni.npwg.io"]
  resources: ["bridgeconfigurations"]
  verbs: ["get", "list", "watch"]
# Manage bridge information status reporting
- apiGroups: ["bridgeoperator.k8s.cni.npwg.io"]
  resources: ["bridgeinformation"]
  verbs: ["get", "list", "create", "update", "delete"]
- apiGroups: ["bridgeoperator.k8s.cni.npwg.io"]
  resources: ["bridgeinformation/status"]
  verbs: ["get", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bridge-operator-daemon
  labels:
    app.kubernetes.io/name: bridge-operator-daemon
    app.kubernetes.io/part-of: bridge-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bridge-operator-daemon
subjects:
- kind: ServiceAccount
  name: bridge-operator-daemon
  namespace: bridge-operator-system

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: bridge-operator-daemon
  namespace: bridge-operator-system
  labels:
    app.kubernetes.io/name: bridge-operator-daemon
    app.kubernetes.io/part-of: bridge-operator
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: bridge-operator-daemon
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bridge-operator-daemon
        app.kubernetes.io/part-of: bridge-operator
    spec:
      hostNetwork: true
      serviceAccountName: bridge-operator-daemon
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
      - operator: Exists
        effect: NoSchedule
      containers:
      - name: bridge-operator-daemon
        image: ghcr.io/k8snetworkplumbingwg/bridge-operator:latest-daemon
        command:
        - /usr/bin/bridge-operator-daemon
        resources:
          requests:
            cpu: 50m
            memory: 50Mi
          limits:
            cpu: 100m
            memory: 100Mi
        securityContext:
          # Removed privileged: true - using specific capabilities instead
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: false  # Need root for network operations
          runAsUser: 0
          capabilities:
            drop:
            - ALL
            add:
            - NET_ADMIN  # Required for bridge/network management
        volumeMounts:
        - name: run
          mountPath: /run
        - name: varrun
          mountPath: /var/run
      volumes:
      - name: run
        hostPath:
          path: /run
      - name: varrun
        hostPath:
          path: /var/run

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bridge-operator-daemon
  namespace: bridge-operator-system
  labels:
    app.kubernetes.io/name: bridge-operator-daemon
    app.kubernetes.io/part-of: bridge-operator

